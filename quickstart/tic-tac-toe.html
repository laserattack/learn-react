<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>React - Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .game {
            display: flex;
            flex-direction: row;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .board-row {
            display: flex;
        }
        .square {
            width: 60px;
            height: 60px;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #999;
            background-color: #fff;
            cursor: pointer;
            margin: -1px 0 0 -1px;
        }
        .square:focus {
            outline: none;
        }
        .status {
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
        }
        .game-info {
            margin-left: 20px;
        }
        .game-info ol {
            padding-left: 20px;
        }
        .game-info button {
            padding: 5px 10px;
            margin: 2px;
            font-size: 14px;
            cursor: pointer;
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        function Square({ value, onSquareClick }) {
            return (
                <button className="square" onClick={onSquareClick}>
                    {value}
                </button>
            );
        }

        function Board({ xIsNext, squares, onPlay }) {
            function handleClick(i) {
                // If there is a winner OR the cell is already occupied, we do nothing
                if (calculateWinner(squares) || squares[i]) {
                    return;
                }
                // get array copy and set X or O
                const nextSquares = squares.slice();
                if (xIsNext) {
                    nextSquares[i] = 'X';
                } else {
                    nextSquares[i] = 'O';
                }

                // execute callback
                onPlay(nextSquares);
            }

            // update status
            const winner = calculateWinner(squares);
            let status;
            if (winner) {
                status = 'Winner: ' + winner;
            } else {
                status = 'Next player: ' + (xIsNext ? 'X' : 'O');
            }

            // return ui
            return (
                <>
                    <div className="status">{status}</div>
                    <div className="board-row">
                        <Square value={squares[0]} onSquareClick={() => handleClick(0)} />
                        <Square value={squares[1]} onSquareClick={() => handleClick(1)} />
                        <Square value={squares[2]} onSquareClick={() => handleClick(2)} />
                    </div>
                    <div className="board-row">
                        <Square value={squares[3]} onSquareClick={() => handleClick(3)} />
                        <Square value={squares[4]} onSquareClick={() => handleClick(4)} />
                        <Square value={squares[5]} onSquareClick={() => handleClick(5)} />
                    </div>
                    <div className="board-row">
                        <Square value={squares[6]} onSquareClick={() => handleClick(6)} />
                        <Square value={squares[7]} onSquareClick={() => handleClick(7)} />
                        <Square value={squares[8]} onSquareClick={() => handleClick(8)} />
                    </div>
                </>
            );
        }

        function Game() {
            const [history, setHistory] = useState([Array(9).fill(null)]); // board states array
            const [currentMove, setCurrentMove] = useState(0);
            const xIsNext = currentMove % 2 === 0;
            const currentSquares = history[currentMove];                   // current board state

            // a callback executed when setting a value in a cell
            function handlePlay(nextSquares) {
                const nextHistory = [...history.slice(0, currentMove + 1), nextSquares];
                setHistory(nextHistory);
                setCurrentMove(nextHistory.length - 1);
            }

            // a callback executed when you click on "go to move"
            function jumpTo(nextMove) {
                setCurrentMove(nextMove);
            }

            const moves = history.map((squares, move) => {
                let description;
                if (move > 0) {
                    description = 'Go to move #' + move;
                } else {
                    description = 'Go to game start';
                }
                return (
                    <li key={move}>
                        <button onClick={() => jumpTo(move)}>{description}</button>
                    </li>
                );
            });

            return (
                <div className="game">
                    <div className="game-board">
                        <Board xIsNext={xIsNext} squares={currentSquares} onPlay={handlePlay} />
                    </div>
                    <div className="game-info">
                        <h2>Game History</h2>
                        <ol>{moves}</ol>
                    </div>
                </div>
            );
        }

        function calculateWinner(squares) {
            const lines = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6],
            ];
            for (let i = 0; i < lines.length; i++) {
                const [a, b, c] = lines[i];
                if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                    return squares[a];
                }
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Game />);
    </script>
</body>
</html>
